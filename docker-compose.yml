# Networks for container isolation (ARCH-01, ARCH-02, ARCH-03)
networks:
  red-net:
    driver: bridge
  orchestrator-red:
    driver: bridge
  orchestrator-blue:
    driver: bridge
  sandbox-net:
    driver: bridge
  audit-net:
    driver: bridge

services:
  # Red Agent - Attack engine (ARCH-01: red-net isolation)
  red-agent:
    build:
      context: .
      dockerfile: Dockerfile.red-agent
    container_name: bayora-red-agent
    networks:
      - red-net
      - orchestrator-red
    security_opt:
      - seccomp:/configs/seccomp/red-agent.json
    mem_limit: 512m
    environment:
      - LOG_LEVEL=INFO
      - ORCHESTRATOR_URL=http://orchestrator:8080

  # Orchestrator - Central coordinator (ARCH-03: intermediary between isolated components)
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: bayora-orchestrator
    networks:
      - orchestrator-red
      - orchestrator-blue
      - sandbox-net
      - audit-net
    ports:
      - "8080:8080"
    security_opt:
      - seccomp:/configs/seccomp/orchestrator.json
    mem_limit: 1g
    environment:
      - LOG_LEVEL=INFO
      - RED_AGENT_URL=http://red-agent:8000
      - BLUE_AGENT_URL=http://blue-agent:8000
      - LLM_SANDBOX_URL=http://llm-sandbox:8000
      - AUDIT_URL=http://audit:8000

  # Blue Agent - Defense evaluation (ARCH-02: blue-net isolation)
  blue-agent:
    build:
      context: .
      dockerfile: Dockerfile.blue-agent
    container_name: bayora-blue-agent
    networks:
      - orchestrator-blue
    security_opt:
      - seccomp:/configs/seccomp/blue-agent.json
    mem_limit: 512m
    environment:
      - LOG_LEVEL=INFO
      - ORCHESTRATOR_URL=http://orchestrator:8080

  # LLM Sandbox - LLM execution with gVisor (ARCH-06, ARCH-07)
  llm-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.llm-sandbox
    container_name: bayora-llm-sandbox
    # Note: runtime: runsc requires gVisor to be installed on host
    # For non-Linux environments, remove runtime line or use native runtime
    networks:
      - sandbox-net
    dns:
      - 8.8.8.8
    dns_search:
      - local
    security_opt:
      - seccomp:/configs/seccomp/llm-sandbox.json
    # ARCH-07: cgroup v2 resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    environment:
      - LOG_LEVEL=INFO
      - ORCHESTRATOR_URL=http://orchestrator:8080

  # Audit - Logging service (ARCH-04: Merkle-chained audit)
  audit:
    build:
      context: .
      dockerfile: Dockerfile.audit
    container_name: bayora-audit
    networks:
      - audit-net
    security_opt:
      - seccomp:/configs/seccomp/audit.json
    volumes:
      - audit-data:/data
    mem_limit: 256m
    environment:
      - LOG_LEVEL=INFO
      - ORCHESTRATOR_URL=http://orchestrator:8080

# Volumes for persistent data
volumes:
  audit-data: