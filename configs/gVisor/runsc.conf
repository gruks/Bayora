{
  "version": "1",
  "platform": "systrap",
  "description": "gVisor configuration for LLM sandbox container",
  "debug": false,
  "enable_syscall_stats": false,
  "file_access": "proxy",
  "network": "proxy",
  "allowed_direct_syscallns": [],
  "fs_denied": ["proc", "sys", "dev"],
  "network_denied": ["raw", "packet"],
  "strace": false,
  "log_netlink": false,
  "log_file": "/var/log/gvisor/runsc.log",
  "panic_on_fail": false,
  "root": "/tmp/gvisor"
}