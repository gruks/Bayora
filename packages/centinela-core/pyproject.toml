[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "centinela-core"
version = "0.1.0"
description = "Shared core types, models, and interfaces for CENTINELA services"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "litellm>=1.84.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/centinela"]
